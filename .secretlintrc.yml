rules:
  # L4: ✅ Prevent secrets in code — checks for API keys, tokens, passwords
  - id: no-api-keys
    pattern:
      regex: (?i)(?:api[_-]?key|secret|token|password|auth)[=:]["'][^"'\s]{8,}["']
      filetypes: [ts, tsx, js, jsx, json, yaml, mjs]
    message: "Potential secret or API key hardcoded in source. Use environment variables instead."
    level: error

  - id: no-bearer
    pattern:
      regex: (?i)bearer\s+[a-z0-9_-]{20,}
      filetypes: [ts, tsx, js, jsx]
    message: "Hardcoded Bearer token detected. Remove from source."
    level: error
